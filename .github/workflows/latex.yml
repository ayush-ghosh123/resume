name: Compile LaTeX

on: [push]

jobs:
  build_pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: resume.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: resume
          path: resume.pdf
